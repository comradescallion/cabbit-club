<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>not found</title>
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div id="dynamic-404">
        <h1>404 - Page Not Found</h1>
        <p>Sorry, the page you are looking for does not exist.</p>
        <a href="/">Go back home</a>
    </div>

    <script>
        var currentPath = window.location.pathname;
        var container = document.getElementById("dynamic-404");

        if (currentPath.startsWith("/TOWNSEND/thepastacreependium/")) {
            window.location.href = "/TOWNSEND/alexandriasfolly/archive?=thepastacreependium.org/" + currentPath.substring("/TOWNSEND/thepastacreependium/".length);
        }
        else if (currentPath.toLowerCase().startsWith("/townsend")) {
            window.location.href = "/TOWNSEND" + currentPath.substring("/townsend".length);
        }
    </script>
</body>
</html>
